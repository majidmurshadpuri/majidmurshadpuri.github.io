<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZIP to Master PDF Converter</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #f8fafc;
            --text: #0f172a;
            --border: #e2e8f0;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 600px;
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
        h1 {
            font-size: 1.5rem;
            margin-top: 0;
        }
        .upload-area {
            border: 2px dashed var(--primary);
            padding: 30px 20px;
            text-align: center;
            border-radius: 8px;
            background: #eff6ff;
            margin-bottom: 20px;
            cursor: pointer;
        }
        input[type="file"] {
            display: none;
        }
        .btn {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: opacity 0.2s;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .log-container {
            margin-top: 20px;
            background: #1e293b;
            color: #10b981;
            padding: 16px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 0.85rem;
            height: 250px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .log-error { color: #ef4444; }
        .log-warn { color: #f59e0b; }
    </style>
</head>
<body>

<div class="container">
    <h1>ZIP to Master PDF</h1>
    <p style="color: #64748b; font-size: 0.9rem;">Upload a .zip containing PDFs, TXTs, or HTMLs to combine them into one file.</p>
    
    <label class="upload-area" id="drop-zone">
        <span id="file-name">Tap to select a .zip file</span>
        <input type="file" id="zip-input" accept=".zip">
    </label>

    <button id="convert-btn" class="btn" disabled>Convert to Master PDF</button>

    <div class="log-container" id="activity-log">📋 Activity log awaiting input...</div>
</div>

<script>
    const { PDFDocument, StandardFonts, rgb } = PDFLib;
    const zipInput = document.getElementById('zip-input');
    const fileNameDisplay = document.getElementById('file-name');
    const convertBtn = document.getElementById('convert-btn');
    const activityLog = document.getElementById('activity-log');

    let currentFile = null;

    // Utility: Add zero padding for time
    const pad = (n) => n.toString().padStart(2, '0');

    // Utility: Logging
    function logMsg(message, type = 'info') {
        const now = new Date();
        const timeStr = `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
        let prefix = '📌';
        let className = '';
        
        if (type === 'error') { prefix = '💥 FATAL:'; className = 'log-error'; }
        else if (type === 'warn') { prefix = '⚠️'; className = 'log-warn'; }
        else if (type === 'success') { prefix = '✅'; }

        const logEntry = document.createElement('div');
        if (className) logEntry.className = className;
        logEntry.textContent = `${prefix} ${timeStr} — ${message}`;
        
        activityLog.appendChild(logEntry);
        activityLog.scrollTop = activityLog.scrollHeight;
    }

    // Utility: Sanitize text to fix the "WinAnsi cannot encode" bug
    function sanitizeForWinAnsi(text) {
        // Keeps standard ASCII and basic formatting. Strips emojis and smart quotes.
        return text.replace(/[^\x00-\x7F]/g, " ").replace(/\r\n/g, "\n");
    }

    // Utility: Simple word wrapper for plain text PDF generation
    function wrapText(text, maxCharsPerLine) {
        const lines = [];
        const rawLines = text.split('\n');
        
        rawLines.forEach(line => {
            let currentLine = '';
            const words = line.split(' ');
            words.forEach(word => {
                if ((currentLine + word).length > maxCharsPerLine) {
                    lines.push(currentLine);
                    currentLine = word + ' ';
                } else {
                    currentLine += word + ' ';
                }
            });
            lines.push(currentLine);
        });
        return lines;
    }

    // Handle File Selection
    zipInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) {
            currentFile = e.target.files[0];
            fileNameDisplay.textContent = currentFile.name;
            convertBtn.disabled = false;
            activityLog.innerHTML = '📋 Activity log\n'; // Reset log
            logMsg(`Loaded ZIP: "${currentFile.name}" (${(currentFile.size / 1024).toFixed(1)} KB)`);
        }
    });

    // Handle Conversion
    convertBtn.addEventListener('click', async () => {
        if (!currentFile) return;
        convertBtn.disabled = true;
        convertBtn.textContent = "Processing...";

        try {
            // 1. Initialize Master PDF
            const masterPdf = await PDFDocument.create();
            const font = await masterPdf.embedFont(StandardFonts.Helvetica);
            const fontSize = 12;

            // 2. Load ZIP
            const zip = new JSZip();
            const contents = await zip.loadAsync(currentFile);
            const files = Object.values(contents.files).filter(f => !f.dir); // Exclude folders
            
            logMsg(`ZIP parsed successfully (${files.length} entries)`, 'success');

            let processedCount = 0;

            // 3. Process each file
            for (const file of Object.values(files)) {
                try {
                    const ext = file.name.split('.').pop().toLowerCase();
                    const fileNameStr = file.name;

                    if (ext === 'pdf') {
                        // Handle Existing PDFs
                        const fileData = await file.async("uint8array");
                        const tempPdf = await PDFDocument.load(fileData);
                        const copiedPages = await masterPdf.copyPages(tempPdf, tempPdf.getPageIndices());
                        copiedPages.forEach(page => masterPdf.addPage(page));
                        
                        logMsg(`Merged PDF: ${fileNameStr} (${tempPdf.getPageCount()} pages)`);
                        processedCount++;

                    } else if (ext === 'txt' || ext === 'html') {
                        // Handle Text/HTML files
                        let textData = await file.async("string");
                        
                        if (ext === 'html') {
                            // Basic HTML tag stripping
                            const doc = new DOMParser().parseFromString(textData, 'text/html');
                            textData = doc.body.textContent || "";
                        }

                        // Fix the WinAnsi bug
                        textData = sanitizeForWinAnsi(textData);
                        
                        // Add title page/header for text docs
                        let page = masterPdf.addPage();
                        const { width, height } = page.getSize();
                        let yOffset = height - 50;

                        // Draw Title using properly destructured rgb() function
                        page.drawText(`File: ${fileNameStr}`, {
                            x: 50, y: yOffset, size: 14, font: font, color: rgb(0.1, 0.25, 0.4) 
                        });
                        yOffset -= 30;

                        // Wrap text (approx 90 chars fit on A4 at 12pt Helvetica)
                        const lines = wrapText(textData, 90);

                        for (const line of lines) {
                            if (yOffset < 50) {
                                page = masterPdf.addPage();
                                yOffset = height - 50;
                            }
                            page.drawText(line, { x: 50, y: yOffset, size: fontSize, font: font });
                            yOffset -= 15; // Line height
                        }

                        logMsg(`Extracted Text: ${fileNameStr}`);
                        processedCount++;

                    } else {
                        // Skip unsupported files (.lnk, .jpg, etc)
                        logMsg(`Skipped (unsupported type): ${fileNameStr}`, 'warn');
                    }
                } catch (err) {
                    logMsg(`Failed processing ${file.name}: ${err.message}`, 'error');
                }
            }

            // 4. Save and Download Master PDF
            if (processedCount > 0) {
                logMsg(`Finalizing Master PDF...`);
                const pdfBytes = await masterPdf.save();
                const blob = new Blob([pdfBytes], { type: "application/pdf" });
                const url = URL.createObjectURL(blob);
                
                const link = document.createElement('a');
                link.href = url;
